<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yummy</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/logo.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script
      defer=""
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/main.js" defer></script>
  </head>
  <body class="bg-black">
    <section class="home visible">
      <div class="container mt-4">
        <div class="row g-3 cards-container"></div>
      </div>
    </section>
    <nav>
      <div
        class="vertical-nav position-fixed top-0 bottom-0 start-0 d-flex z-2"
      >
        <div
          class="menu bg-black text-white p-3 d-flex flex-column justify-content-between"
        >
          <ul class="nav flex-column">
            <li class="">
              <a
                class="nav-link text-decoration-none text-white"
                aria-current="page"
                href="#"
                id="search-section"
                >Search</a
              >
            </li>
            <li class="">
              <a
                class="nav-link text-decoration-none text-white"
                aria-current="page"
                href="#"
                id="categories-section"
                >Categories</a
              >
            </li>
            <li class="">
              <a
                class="nav-link text-decoration-none text-white"
                aria-current="page"
                href="#"
                id="areas-section"
                >Areas</a
              >
            </li>
            <li class="">
              <a
                class="nav-link text-decoration-none text-white"
                aria-current="page"
                href="#"
                id="ingredients-section"
                >Ingredients</a
              >
            </li>
            <li class="">
              <a
                class="nav-link text-decoration-none text-white"
                aria-current="page"
                href="#"
                id="contact-section"
                >Contact Us</a
              >
            </li>
          </ul>
          <div class="info">
            <div class="icons">
              <i class="fa-brands fa-facebook"></i>
              <i class="fa-brands fa-twitter"></i>
              <i class="fa-solid fa-globe"></i>
            </div>
            <p>Copyright Â© 2019 All Rights Reserved.</p>
          </div>
        </div>
        <div
          class="side-bar bg-white d-flex flex-column justify-content-between align-items-center py-3"
        >
          <img src="./assets/images/logo.png" alt="Yummy logo" class="w-100" />
          <i class="fa-solid fa-bars fs-2" id="show-menu"></i>
          <!-- <i class="fa-solid fa-close fs-2" id="close-menu"></i> -->
          <div class="icons d-flex flex-column gap-2">
            <i class="fa-solid fa-globe"></i>
            <i class="fa-solid fa-share"></i>
          </div>
        </div>
      </div>
    </nav>
    <section class="search">
      <div class="container pt-4">
        <div class="row g-2">
          <div class="col-6">
            <input
              type="text"
              class="form-control bg-black text-white"
              placeholder="search by name"
              id="search-by-name"
              name="search-by-name"
            />
          </div>
          <div class="col-6">
            <input
              type="text"
              class="form-control bg-black text-white"
              placeholder="search by first letter"
              id="search-by-first-letter"
              name="search-by-first-letter"
              maxlength="1"
            />
          </div>
        </div>
        <br />
        <div class="row g-3 cards-container"></div>
      </div>
    </section>
    <section class="categories">
      <div class="container mt-4">
        <div class="row g-3 cards-container"></div>
      </div>
    </section>
    <section class="areas">
      <div class="container mt-4">
        <div class="row g-3 cards-container"></div>
      </div>
    </section>
    <section class="ingredients">
      <div class="container mt-4">
        <div class="row g-3 cards-container"></div>
      </div>
    </section>
    <section class="recipe-details"></section>
    <section class="contact">
      <div
        class="container w-75 text-center vh-100 d-flex flex-column justify-content-center"
      >
        <div class="row g-4">
          <div class="col-md-6">
            <input
              id="full-name"
              type="text"
              class="form-control"
              placeholder="Enter Your Name"
            />
          </div>
          <div class="col-md-6">
            <input
              id="email"
              type="email"
              class="form-control"
              placeholder="Enter Your Email"
            />
          </div>
          <div class="col-md-6">
            <input
              id="phone"
              type="text"
              class="form-control"
              placeholder="Enter Your Phone"
            />
          </div>
          <div class="col-md-6">
            <input
              id="age"
              type="number"
              min="0"
              max="110"
              class="form-control"
              placeholder="Enter Your Age"
            />
          </div>
          <div class="col-md-6">
            <input
              id="password"
              type="password"
              class="form-control"
              placeholder="Enter Your Password"
            />
          </div>
          <div class="col-md-6">
            <input
              id="confirm-password"
              type="password"
              class="form-control"
              placeholder="Repassword"
            />
          </div>
        </div>
        <button
          id="submitBtn"
          disabled=""
          class="btn btn-outline-success px-2 mt-3 mx-auto fw-bold"
        >
          Submit
        </button>
      </div>
    </section>
  </body>
</html>
